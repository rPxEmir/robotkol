<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Kol Kontrol</title>

<style>
:root{
--primary:#00adb5;
--bg:#1a1a2e;
--card:#16213e;
--text:#ffffff;
}

body{
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
padding:20px;
}

.container{
background:var(--card);
padding:25px;
border-radius:15px;
width:420px;
}

h1{
text-align:center;
color:var(--primary);
}

button{
background:var(--primary);
border:none;
padding:15px;
width:100%;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.control{
margin-top:20px;
}

.angle{
float:right;
color:var(--primary);
font-weight:bold;
}

input[type=range]{
width:100%;
}
</style>
</head>

<body>

<div class="container">

<h1>ROBOT KOL</h1>

<button id="connectBtn">BLUETOOTH BAĞLAN</button>

<div class="control">
<span class="angle" id="val1">90°</span>
GÖVDE
<input type="range" min="0" max="180" value="90"
onchange="sendData('A',this.value,'val1')">
</div>

<div class="control">
<span class="angle" id="val4">90°</span>
KISKAÇ
<input type="range" min="0" max="180" value="90"
onchange="sendData('D',this.value,'val4')">
</div>

</div>

<script>

let characteristic;

document.getElementById("connectBtn").addEventListener("click", async ()=>{

const device = await navigator.bluetooth.requestDevice({
acceptAllDevices:true,
optionalServices:['0000ffe0-0000-1000-8000-00805f9b34fb']
});

const server = await device.gatt.connect();
const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');

characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

alert("Bağlandı");

});

async function sendData(prefix,value,id){

document.getElementById(id).innerText=value+"°";

if(!characteristic) return;

let data = new TextEncoder().encode(prefix+value+"\n");

await characteristic.writeValue(data);

}

</script>

</body>
</html>
