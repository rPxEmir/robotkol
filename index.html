<button id="openBtn">KISKAÇ AÇ</button>
<button id="closeBtn">KISKAÇ KAPAT</button>

<script>
let characteristic;
let intervalKiskac;

// Açma butonu
document.getElementById('openBtn').addEventListener('mousedown', ()=>{
  clearInterval(intervalKiskac);
  intervalKiskac = setInterval(()=>{
    sendIncrement('D', 1); // 1° artış
  }, 50); // her 50ms bir adım
});

document.getElementById('openBtn').addEventListener('mouseup', ()=>{
  clearInterval(intervalKiskac);
});

// Kapama butonu
document.getElementById('closeBtn').addEventListener('mousedown', ()=>{
  clearInterval(intervalKiskac);
  intervalKiskac = setInterval(()=>{
    sendIncrement('D', -1); // 1° azalış
  }, 50);
});

document.getElementById('closeBtn').addEventListener('mouseup', ()=>{
  clearInterval(intervalKiskac);
});

let kiskacPos = 70; // Arduino ile aynı başlangıç

async function sendIncrement(prefix, step){
  kiskacPos += step;
  if(kiskacPos < 30) kiskacPos = 30;
  if(kiskacPos > 110) kiskacPos = 110;

  if(!characteristic) return;
  let encoder = new TextEncoder();
  await characteristic.writeValue(encoder.encode(prefix + kiskacPos + "\n"));
}
</script>
