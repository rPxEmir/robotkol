<!DOCTYPE html>
<html lang="tr">
<head>
    <title>Mekatronik Robot Kol</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a2e; color: white; padding: 20px; }
        .box { background: #16213e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; margin: auto; }
        button { background: #4CAF50; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; }
        input[type=range] { width: 100%; margin: 40px 0; height: 10px; accent-color: #00adb5; }
        h1 { color: #00adb5; }
        #aciYazi { font-size: 2rem; font-weight: 900; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Robot Kol Kontrol</h1>
        <button id="baglanButon">Cihaz Ara ve Bağlan</button>
        <hr style="border: 0.5px solid #0f3460; margin: 20px 0;">
        <input type="range" id="slider" min="0" max="180" value="90">
        <div id="aciYazi">90°</div>
    </div>

    <script>
        let karakter;
        let gönderiliyor = false;

        document.getElementById('baglanButon').addEventListener('click', async () => {
            try {
                const cihaz = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await cihaz.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                karakter = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                document.getElementById('baglanButon').innerText = "BAĞLANDI ✅";
                document.getElementById('baglanButon').style.background = "#00adb5";
            } catch (hata) {
                alert("Hata: " + hata.message);
            }
        });

        document.getElementById('slider').addEventListener('input', async (e) => {
            let deger = e.target.value;
            document.getElementById('aciYazi').innerText = deger + "°";
            
            // TİTREME ENGELLEYİCİ: Eğer önceki veri hala gönderiliyorsa yenisini gönderme
            if (karakter && !gönderiliyor) {
                gönderiliyor = true;
                try {
                    let veri = new Uint8Array([parseInt(deger)]);
                    await karakter.writeValue(veri);
                } catch (e) {}
                
                // Bluetooth hattının nefes alması için 50ms bekle
                setTimeout(() => { gönderiliyor = false; }, 50);
            }
        });
    </script>
</body>
</html>
