<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Kol Kontrol Paneli</title>

<style>
:root {
--primary:#00adb5;
--bg:#1a1a2e;
--card:#16213e;
--text:#ffffff;
}

body{
font-family:'Segoe UI',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.container{
background:var(--card);
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
width:95%;
max-width:450px;
}

h1{
text-align:center;
color:var(--primary);
font-size:1.4rem;
}

.status{
text-align:center;
margin-bottom:20px;
font-weight:900;
}

.dot{
height:12px;
width:12px;
background:#ff4d4d;
border-radius:50%;
display:inline-block;
margin-right:8px;
}

.online{
background:#4caf50;
box-shadow:0 0 10px #4caf50;
}

button#connectBtn{
background:var(--primary);
color:white;
border:none;
padding:15px;
border-radius:10px;
width:100%;
font-weight:900;
cursor:pointer;
letter-spacing:1px;
}

.control-block{
background:rgba(255,255,255,0.05);
margin:15px 0;
padding:15px;
border-radius:12px;
border-left:5px solid var(--primary);
}

.label{
display:block;
font-size:1.1rem;
font-weight:900;
color:var(--text);
text-transform:uppercase;
margin-bottom:10px;
letter-spacing:1px;
}

.angle-display{
float:right;
color:var(--primary);
font-weight:900;
font-size:1.2rem;
}

input[type=range]{
width:100%;
cursor:pointer;
accent-color:var(--primary);
}

.limit-labels{
display:flex;
justify-content:space-between;
font-size:0.75rem;
font-weight:bold;
margin-top:5px;
opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<h1>ROBOT KOL KONTROLÜ</h1>

<div class="status">
<span id="statusDot" class="dot"></span>
<span id="statusText">BAĞLI DEĞİL</span>
</div>

<button id="connectBtn">BLUETOOTH İLE BAĞLAN</button>

<div class="control-block">
<span class="angle-display" id="val1">90°</span>
<label class="label">GÖVDE (SOLA - SAĞA)</label>
<input type="range" min="0" max="180" value="90"
onchange="sendData('A',this.value,'val1')">
<div class="limit-labels"><span>0° (SOL)</span><span>180° (SAĞ)</span></div>
</div>

<div class="control-block">
<span class="angle-display" id="val4">90°</span>
<label class="label">KISKAÇ (KAPAT - AÇ)</label>
<input type="range" min="0" max="180" value="90"
onchange="sendData('D',this.value,'val4')">
<div class="limit-labels"><span>0° (KAPAT)</span><span>180° (AÇ)</span></div>
</div>

</div>

<script>

let characteristic;

document.getElementById('connectBtn').addEventListener('click',async()=>{

try{

const device=await navigator.bluetooth.requestDevice({
acceptAllDevices:true,
optionalServices:['0000ffe0-0000-1000-8000-00805f9b34fb']
});

const server=await device.gatt.connect();
const service=await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
characteristic=await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');

document.getElementById('statusDot').classList.add('online');
document.getElementById('statusText').innerText="BAĞLI";
document.getElementById('connectBtn').style.display="none";

}catch(err){

alert("Hata: "+err.message);

}

});

async function sendData(prefix,value,displayId){

document.getElementById(displayId).innerText=value+"°";

if(characteristic){

const encoder=new TextEncoder();
const data=encoder.encode(prefix+value+"\n");

await characteristic.writeValue(data);

}

}

</script>

</body>
</html>
