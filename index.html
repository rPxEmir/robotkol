<!DOCTYPE html>
<html>
<head>
    <title>Mekatronik Servo Kontrol</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #4CAF50; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
        input[type=range] { width: 100%; margin: 40px 0; height: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Robot Kol Kontrol</h1>
        <button id="baglanButon">Cihaz Ara ve Bağlan</button>
        <hr>
        <input type="range" id="slider" min="0" max="180" value="90">
        <h2 id="aciYazi">Açı: 90</h2>
    </div>

    <script>
        let karakter;

        document.getElementById('baglanButon').addEventListener('click', async () => {
            try {
                // HİÇBİR FİLTRE YOK: Etraftaki her şeyi listeler
                const cihaz = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });

                const server = await cihaz.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                karakter = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                alert("Bağlantı Başarılı!");
            } catch (hata) {
                alert("Hata: " + hata.message);
            }
        });

        document.getElementById('slider').addEventListener('input', async (e) => {
            let deger = e.target.value;
            document.getElementById('aciYazi').innerText = "Açı: " + deger;
            if (karakter) {
                let veri = new Uint8Array([parseInt(deger)]);
                await karakter.writeValue(veri);
            }
        });
    </script>
</body>
</html>
