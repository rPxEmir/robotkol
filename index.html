<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Kol Buton Kontrol</title>
    <style>
        :root { --primary: #00adb5; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: var(--card); padding: 20px; border-radius: 15px; width: 95%; max-width: 400px; }
        .status { text-align: center; margin-bottom: 15px; font-weight: 900; }
        .control-block { background: rgba(255,255,255,0.05); margin: 10px 0; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); }
        .label { display: block; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; }
        button:active { background: #008d94; }
        .connect-btn { background: #4caf50; width: 100%; padding: 15px; margin-bottom: 20px; font-size: 1.1rem; }
        .angle-display { float: right; color: var(--primary); font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div class="status" id="statusText">🔴 BAĞLI DEĞİL</div>
    <button class="connect-btn" id="connectBtn">BLUETOOTH BAĞLAN</button>

    <div class="control-block">
        <span class="angle-display" id="valA">90°</span>
        <label class="label">GÖVDE</label>
        <div class="btn-group">
            <button onclick="changeAngle('A', -10)">SOLA</button>
            <button onclick="setAngle('A', 90)">MERKEZ</button>
            <button onclick="changeAngle('A', 10)">SAĞA</button>
        </div>
    </div>

    <div class="control-block">
        <span class="angle-display" id="valB">90°</span>
        <label class="label">KOL</label>
        <div class="btn-group">
            <button onclick="changeAngle('B', -10)">AŞAĞI</button>
            <button onclick="changeAngle('B', 10)">YUKARI</button>
        </div>
    </div>

    <div class="control-block">
        <span class="angle-display" id="valD">90°</span>
        <label class="label">KISKAÇ</label>
        <div class="btn-group">
            <button onclick="setAngle('D', 0)">KAPAT</button>
            <button onclick="setAngle('D', 90)">AÇ</button>
        </div>
    </div>
</div>

<script>
    let characteristic;
    let angles = { A: 90, B: 90, C: 90, D: 90 };

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
            characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
            document.getElementById('statusText').innerText = "🟢 BAĞLI";
            document.getElementById('connectBtn').style.display = "none";
        } catch (err) { alert(err); }
    });

    function changeAngle(p, delta) {
        angles[p] = Math.min(180, Math.max(0, angles[p] + delta));
        update(p);
    }

    function setAngle(p, val) {
        angles[p] = val;
        update(p);
    }

    async function update(p) {
        document.getElementById('val' + p).innerText = angles[p] + "°";
        if (characteristic) {
            const data = new TextEncoder().encode(p + angles[p] + "\n");
            await characteristic.writeValue(data);
        }
    }
</script>
</body>
</html>
